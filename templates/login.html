{% extends "base.html" %}
{% block title %}Sign in{% endblock %}

{% block body %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <div class="brand-text">
                <h1>{{ app_name }}</h1>
                <p>End-to-end encrypted · AES-256 + RSA-2048</p>
            </div>
        </div>

        <div class="auth-body">
            <h2>Welcome back</h2>
            <p class="sub">Sign in to access your encrypted conversations.</p>

            <div id="alert" class="alert hidden"></div>

            <form id="loginForm" novalidate>
                <div class="field">
                    <label for="username">Username</label>
                    <input class="input" type="text" id="username" autocomplete="username" placeholder="e.g. alice" required>
                </div>
                <div class="field">
                    <label for="password">Password</label>
                    <input class="input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="label">Sign in securely</span>
                </button>
            </form>

            <p class="sub" style="text-align:center;margin:22px 0 0;font-size:13.5px;">
                New here? <a href="{{ url_for('register') }}">Create an account</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const form = document.getElementById('loginForm');
const alertBox = document.getElementById('alert');
const submitBtn = document.getElementById('submitBtn');

function showAlert(msg, type) {
    alertBox.textContent = msg;
    alertBox.className = `alert alert-${type}`;
}
function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.innerHTML = on ? '<span class="spinner"></span> Signing in…' : '<span class="label">Sign in securely</span>';
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showAlert('Please enter your username and password.', 'error'); return; }

    setLoading(true);
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
            showAlert('Authenticated. Redirecting…', 'success');
            setTimeout(() => window.location.href = '/dashboard', 700);
        } else {
            showAlert(data.message || 'Login failed.', 'error');
            setLoading(false);
        }
    } catch (err) {
        showAlert('Network error. Please try again.', 'error');
        setLoading(false);
    }
});

// Redirect-loop-safe auth check: rely on the JSON `success` flag, NOT response.ok
// (the API now returns 401 JSON instead of redirecting to /login).
(async function checkAuth() {
    try {
        const res = await fetch('/api/stats');
        if (res.ok) {
            const data = await res.json();
            if (data && data.success) window.location.href = '/dashboard';
        }
    } catch (_) { /* not logged in — stay here */ }
})();
</script>
{% endblock %}
